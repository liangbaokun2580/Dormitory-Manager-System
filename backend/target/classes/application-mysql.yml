# 使用方式：mvn spring-boot:run -Dspring-boot.run.profiles=mysql
# 或设置环境变量 SPRING_PROFILES_ACTIVE=mysql
# 需先创建数据库：CREATE DATABASE dormitory DEFAULT CHARSET utf8mb4;
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dormitory?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234567890

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
